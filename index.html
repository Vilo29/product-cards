<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cards-container">
        <div class="card">
            <img class="card-image" src="images/airpods.png" alt="Airpods">
            <h2 class="product-name">Apple AirPods Pro 3</h2>
            <span class="price">$199.99</span>
            <button class="btn">Add to cart</button>
        </div>
        <div class="card">
            <img class="card-image" src="images/headsets.png" alt="Headsets">
            <h2 class="product-name">Logitech G PRO X 2 Lightspeed Wireless Gaming Headset</h2>
            <p class="price">$224.00</p>
            <button class="btn">Add to cart</button>
        </div>
        <div class="card">
            <img class="card-image" src="images/amazon-echo-dot.png" alt="Amazon Echo Dot">
            <h2 class="product-name">Amazon Echo Dot</h2>
            <p class="price">$49.99</p>
            <button class="btn">Add to cart</button>
        </div>
        <div class="card">
            <img class="card-image" src="images/airtags.png" alt="4 AirTags">
            <h2 class="product-name">Apple AirTag</h2>
            <p class="price">$99.00</p>
            <button class="btn">Add to cart</button>
        </div>
        <div class="card">
            <img class="card-image" src="images/portable-charger.png" alt="Portable charger">
            <h2 class="product-name">Anker Prime Power Bank</h2>
            <p class="price">$247.49</p>
            <button class="btn">Add to cart</button>
        </div>
        <div class="card">
            <img class="card-image" src="images/wood-coasters.png" alt="Wood coasters">
            <h2 class="product-name">Wood coasters</h2>
            <p class="price">$9.99</p>
            <button class="btn">Add to cart</button>
        </div>
    </div>
</body>
</html>
